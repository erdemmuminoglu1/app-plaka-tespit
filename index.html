<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP Plaka Ayırt Etme Sistemi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            margin: 20px;
        }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .upload-section { 
            margin: 20px 0; 
            padding: 20px; 
            border: 2px dashed #3498db; 
            border-radius: 8px;
            background-color: #ecf0f1;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #3498db; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            display: none;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }
        .bg-app { background-color: #e74c3c; } 
        .bg-standart { background-color: #2ecc71; } 
        .info-row { margin: 8px 0; font-size: 15px; }
        .info-label { font-weight: bold; color: #34495e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>APP Plaka Kontrol Sistemi</h1>
        <p class="subtitle">AI & Bulut Tabanlı Standart Dışı Plaka Analizi</p>
        
        <div class="upload-section">
            <label for="plaka-resim" style="display:block; margin-bottom:10px; font-weight:bold;">Plaka Fotoğrafı Seçin veya Çekin:</label>
            <input type="file" id="plaka-resim" accept="image/*" aria-required="true">
        </div>

        <button id="analiz-buton" onclick="plakaKontrolEt()">Plakayı Analiz Et</button>

        <div id="sonuc-kutusu" class="result">
            <div id="sonuc-badge" class="badge"></div>
            <div class="info-row"><span class="info-label">Okunan Plaka:</span> <span id="res-plaka"></span></div>
            <div class="info-row"><span class="info-label">Güven Oranı:</span> <span id="res-guven"></span></div>
            <div class="info-row"><span class="info-label">Analiz Açıklaması:</span> <span id="res-aciklamasi"></span></div>
        </div>
    </div>

    <script>
        async function plakaKontrolEt() {
            const dosyaGirdisi = document.getElementById('plaka-resim');
            const sonucKutusu = document.getElementById('sonuc-kutusu');
            const buton = document.getElementById('analiz-buton');
            
            const resBadge = document.getElementById('sonuc-badge');
            const resPlaka = document.getElementById('res-plaka');
            const resGuven = document.getElementById('res-guven');
            const resAciklamasi = document.getElementById('res-aciklamasi');

            if (dosyaGirdisi.files.length === 0) {
                alert("Lütfen önce bir fotoğraf seçin!");
                return;
            }

            const file = dosyaGirdisi.files[0];
            const formData = new FormData();
            formData.append('plaka_resmi', file);

            sonucKutusu.style.display = "block";
            sonucKutusu.style.backgroundColor = "#ebf5fb";
            resBadge.className = "badge";
            resBadge.style.backgroundColor = "#34495e";
            resBadge.innerText = "🔄 Yapay Zeka İnceliyor...";
            resPlaka.innerText = "-";
            resGuven.innerText = "-";
            resAciklamasi.innerText = "Lütfen bekleyin, bulut mimarisi ve AI modeli çalışıyor...";
            buton.disabled = true;

            try {
                // Kendi n8n linkini buraya yapıştır kanka (Test veya Production fark etmez)
                const n8n_url = "https://erdemmumin.app.n8n.cloud/webhook-test/f6e89072-374b-4389-973d-914905f1bbbc"; 

                const response = await fetch(n8n_url, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Ağ hatası: Sunucu ${response.status} kodu döndürdü.`);
                }

                // Veriyi ham metin olarak alıyoruz (Laf kalabalığı ihtimaline karşı)
                const responseText = await response.text();
                
                let rawData;
                try {
                    rawData = JSON.parse(responseText);
                } catch (e) {
                    rawData = responseText;
                }
                
                // n8n yapısına göre metni ayıklıyoruz
                let aiResult = "";
                if (typeof rawData === 'string') {
                    aiResult = rawData;
                } else if (Array.isArray(rawData) && rawData[0]?.text) {
                    aiResult = rawData[0].text;
                } else if (rawData?.text) {
                    aiResult = rawData.text;
                } else {
                    aiResult = JSON.stringify(rawData);
                }

                // KURŞUN GEÇİRMEZ JSON AYIKLAYICI
                // Metnin neresinde olursa olsun ilk '{' ve son '}' karakterleri arasını cımbızlıyoruz
                const firstOpen = aiResult.indexOf('{');
                const lastClose = aiResult.lastIndexOf('}');
                
                if (firstOpen === -1 || lastClose === -1) {
                    throw new Error("Yapay zeka geçerli bir veri şablonu (JSON) üretemedi. Yanıt: " + aiResult.substring(0, 50));
                }
                
                const cleanJsonStr = aiResult.substring(firstOpen, lastClose + 1);
                const cleanJson = JSON.parse(cleanJsonStr);

                // Ekrana yazdırma
                if(cleanJson.durum === "APP") {
                    resBadge.className = "badge bg-app";
                    resBadge.innerText = "🚨 YASAKLI APP PLAKA";
                    sonucKutusu.style.backgroundColor = "#fdf2e9";
                } else {
                    resBadge.className = "badge bg-standart";
                    resBadge.innerText = "✅ YASAL STANDART PLAKA";
                    sonucKutusu.style.backgroundColor = "#eafaf1";
                }

                resPlaka.innerText = cleanJson.plaka || "-";
                resGuven.innerText = cleanJson.guven_orani || "-";
                resAciklamasi.innerText = cleanJson.aciklama || "-";

            } catch (error) {
                resBadge.className = "badge";
                resBadge.style.backgroundColor = "#7f8c8d";
                resBadge.innerText = "❌ Hata Oluştu";
                resAciklamasi.innerText = "Hata Detayı: " + error.message;
                console.error(error);
            } finally {
                buton.disabled = false;
            }
        }
    </script>

</body>
</html>
